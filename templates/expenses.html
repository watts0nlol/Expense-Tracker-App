{% extends "base.html" %}
{% block title %}Expenses{% endblock %}
{% block content %}
<h1>Expenses</h1>

<h2>Filter</h2>
<label>Month</label>
<input type="month" id="filter-month" style="width:auto;" />
<label>Category</label>
<select id="filter-category" style="width:auto;">
  <option value="">All categories</option>
</select>
<br />
<button onclick="loadExpenses()">Apply Filter</button>
<button onclick="clearFilter()">Clear</button>
<button onclick="exportCSV()">Export CSV</button>

<hr />

<h2>Expense List</h2>
<p id="expense-count"></p>
<table>
  <thead>
    <tr>
      <th>Date</th>
      <th>Category</th>
      <th>Description</th>
      <th>Amount</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="expenses-body">
    <tr>
      <td colspan="5">Loading...</td>
    </tr>
  </tbody>
</table>

<hr />

<h2 id="edit-heading" style="display:none;">Edit Expense</h2>
<div id="edit-form" style="display:none;">
  <input type="hidden" id="edit-id" />
  <label>Amount ($)</label>
  <input type="number" id="edit-amount" step="0.01" />
  <label>Date</label>
  <input type="date" id="edit-date" />
  <label>Category</label>
  <select id="edit-category"></select>
  <label>Description</label>
  <input type="text" id="edit-description" />
  <br />
  <button onclick="saveEdit()">Save</button>
  <button onclick="cancelEdit()">Cancel</button>
</div>
{% endblock %}

{% block scripts %}
<script>
  // Block page if not logged in
  if (!localStorage.getItem('username')) {
    document.querySelectorAll('h2, label, input, select, button, table, hr, p').forEach(el => el.style.display = 'none');
    document.querySelector('h1').insertAdjacentHTML('afterend', '<p>Please <a href="/login">log in</a> to view your expenses.</p>');
  } else {
    document.getElementById('filter-month').value = new Date().toISOString().slice(0, 7);
    loadCategories();
    loadExpenses();
  }

  async function loadCategories() {
    const res = await fetch('/expenses/categories');
    if (!res.ok) return;
    const cats = await res.json();
    const filterSel = document.getElementById('filter-category');
    const editSel = document.getElementById('edit-category');
    cats.forEach(c => {
      filterSel.innerHTML += `<option value="${c.categoryID}">${c.name}</option>`;
      editSel.innerHTML += `<option value="${c.categoryID}">${c.name}</option>`;
    });
  }

  // Cache expenses by ID so edit can look them up without inline JSON
  let expenseCache = {};

  async function loadExpenses() {
    clearMsgs();
    const month = document.getElementById('filter-month').value;
    const catID = document.getElementById('filter-category').value;
    let url = '/expenses/?';
    if (month) url += `month=${month}&`;
    if (catID) url += `categoryID=${catID}`;

    const res = await fetch(url);
    const expenses = await res.json();

    expenseCache = {};
    expenses.forEach(e => expenseCache[e.expenseID] = e);

    document.getElementById('expense-count').textContent = `${expenses.length} expense(s) found.`;

    const tbody = document.getElementById('expenses-body');
    if (!expenses.length) {
      tbody.innerHTML = '<tr><td colspan="5">No expenses found.</td></tr>';
      return;
    }

    tbody.innerHTML = expenses.map(e => `
      <tr id="row-${e.expenseID}">
        <td>${e.date}</td>
        <td>${e.categoryName || '—'}</td>
        <td>${e.description || '—'}</td>
        <td>$${e.amount.toFixed(2)}</td>
        <td>
          <button onclick="openEdit(${e.expenseID})">Edit</button>
          <button onclick="deleteExpense(${e.expenseID})">Delete</button>
        </td>
      </tr>
    `).join('');
  }

  function clearFilter() {
    document.getElementById('filter-month').value = new Date().toISOString().slice(0, 7);
    document.getElementById('filter-category').value = '';
    loadExpenses();
  }

  function openEdit(expenseID) {
    const e = expenseCache[expenseID];
    if (!e) return;
    document.getElementById('edit-id').value = e.expenseID;
    document.getElementById('edit-amount').value = e.amount;
    document.getElementById('edit-date').value = e.date;
    document.getElementById('edit-category').value = e.categoryID || '';
    document.getElementById('edit-description').value = e.description || '';
    document.getElementById('edit-heading').style.display = 'block';
    document.getElementById('edit-form').style.display = 'block';
    document.getElementById('edit-heading').scrollIntoView({ behavior: 'smooth' });
  }

  function cancelEdit() {
    document.getElementById('edit-heading').style.display = 'none';
    document.getElementById('edit-form').style.display = 'none';
  }

  async function saveEdit() {
    clearMsgs();
    const id = document.getElementById('edit-id').value;
    const res = await fetch(`/expenses/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        amount: parseFloat(document.getElementById('edit-amount').value),
        date: document.getElementById('edit-date').value,
        categoryID: parseInt(document.getElementById('edit-category').value) || null,
        description: document.getElementById('edit-description').value,
      })
    });
    const data = await res.json();
    if (res.ok) {
      showMsg('Expense updated.');
      cancelEdit();
      loadExpenses();
    } else {
      showErr(data.error);
    }
  }

  async function deleteExpense(id) {
    if (!confirm('Delete this expense?')) return;
    clearMsgs();
    const res = await fetch(`/expenses/${id}`, { method: 'DELETE' });
    const data = await res.json();
    if (res.ok) {
      showMsg('Expense deleted.');
      loadExpenses();
    } else {
      showErr(data.error);
    }
  }

  function exportCSV() {
    const month = document.getElementById('filter-month').value;
    window.location.href = `/expenses/export${month ? '?month=' + month : ''}`;
  }
</script>
{% endblock %}
